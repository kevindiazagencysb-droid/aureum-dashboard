<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aureum Dashboard - Agendas Evergreen</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a15;color:#e0e0e0;min-height:100vh}
.header{background:linear-gradient(135deg,#12122a,#1a1a35);padding:20px 32px;border-bottom:2px solid rgba(255,215,0,0.2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:26px;font-weight:900;color:#ffd700}
.sub{font-size:11px;color:#555;margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.container{max-width:1440px;margin:0 auto;padding:24px 20px}
.wbox{background:#12122a;border:1px solid rgba(255,215,0,0.2);border-radius:14px;padding:20px;margin-bottom:24px}
.wbox h3{color:#ffd700;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
.wtabs{display:flex;flex-wrap:wrap;gap:8px}
.wt{padding:8px 18px;border-radius:30px;border:1px solid #2a2a4a;background:transparent;color:#888;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.wt:hover,.wt.on{background:linear-gradient(90deg,#ffd700,#ffaa00);color:#0a0a15;border-color:transparent;font-weight:800}
.grid5{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:#12122a;border:1px solid #1e1e38;border-radius:14px;padding:22px 20px;position:relative;overflow:hidden;transition:transform .2s}
.kpi:hover{transform:translateY(-2px)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffd700,#ff8800)}
.kl{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.kv{font-size:38px;font-weight:900;color:#ffd700;line-height:1}
.ks{font-size:11px;color:#444;margin-top:6px}
.pb{background:#0a0a15;border-radius:6px;height:5px;margin-top:10px;overflow:hidden}
.pf{height:100%;border-radius:6px;background:linear-gradient(90deg,#ffd700,#ff8800);transition:width .6s}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.card{background:#12122a;border:1px solid #1e1e38;border-radius:14px;padding:22px;margin-bottom:24px}
.card h3{font-size:11px;color:#ffd700;text-transform:uppercase;letter-spacing:2px;margin-bottom:18px}
.ch{position:relative;height:260px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;padding:10px 14px;border-bottom:1px solid #1e1e38;text-align:left;font-weight:600}
td{padding:11px 14px;border-bottom:1px solid #0f0f22;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.02)}
.b{display:inline-flex;align-items:center;gap:4px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-si{background:rgba(0,200,81,0.1);color:#00c851;border:1px solid rgba(0,200,81,0.2)}
.b-no{background:rgba(255,68,85,0.1);color:#ff4455;border:1px solid rgba(255,68,85,0.2)}
.b-buy{background:rgba(255,215,0,0.1);color:#ffd700;border:1px solid rgba(255,215,0,0.2)}
.b-pd{background:rgba(255,136,0,0.1);color:#ff8800;border:1px solid rgba(255,136,0,0.2)}
.b-ns{background:rgba(255,68,85,0.07);color:#cc3344;border:1px solid rgba(255,68,85,0.12)}
.b-ot{background:rgba(80,80,80,0.2);color:#777;border:1px solid rgba(80,80,80,0.3)}
@media(max-width:900px){.r2{grid-template-columns:1fr}.grid5{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">&#9889; AUREUM</div>
    <div class="sub">Dashboard de Agendas &amp; Ventas - Evergreen</div>
  </div>
  <div id="ts" style="font-size:11px;color:#333"></div>
</div>
<div class="container">
  <div class="wbox">
    <h3>Seleccionar Semana</h3>
    <div class="wtabs" id="tabs"></div>
  </div>
  <div class="grid5" id="kpis"></div>
  <div class="r2">
    <div class="card" style="margin-bottom:0"><h3>Resultados de Agenda</h3><div class="ch"><canvas id="cR"></canvas></div></div>
    <div class="card" style="margin-bottom:0"><h3>Agendas por Dia</h3><div class="ch"><canvas id="cD"></canvas></div></div>
  </div>
  <div class="card" style="margin-top:24px">
    <h3>Detalle de Agendas</h3>
    <div style="overflow-x:auto">
      <table><thead><tr><th>Nombre</th><th>Fecha</th><th>Hora</th><th>Closer</th><th>Pres.</th><th>Resultado</th></tr></thead>
      <tbody id="tA"></tbody></table>
    </div>
  </div>
  <div class="card">
    <h3>Ventas Cerradas</h3>
    <div style="overflow-x:auto">
      <table><thead><tr><th>Nombre</th><th>Fecha</th><th>Closer</th><th>Setter</th><th>Programa</th><th>Plan</th><th>Facturacion</th></tr></thead>
      <tbody id="tV"></tbody></table>
    </div>
  </div>
</div>
<script>
var AG=[

  {n:"Ricardo Jose Chiementin",f:"12 Mar",h:"10:30",cl:"Agustin",p:"SI",r:"Compro 1 pago $1193",w:11},
  {n:"Francisco Valderrama",f:"12 Mar",h:"11:30",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Diego Justet",f:"12 Mar",h:"12:30",cl:"Agustin",p:"SI",r:"Compro 3 pagos $500",w:11},
  {n:"Veronica Williams",f:"12 Mar",h:"16:00",cl:"Agustin",p:"SI",r:"Abono reserva $100",w:11},
  {n:"Santiago",f:"12 Mar",h:"20:00",cl:"Agustin",p:"SI",r:"Atendio - Seguimiento Wpp",w:11},
  {n:"Carlos Lolaverry",f:"13 Mar",h:"10:30",cl:"Agustin",p:"SI",r:"Pendiente - Seguimiento Wpp",w:11},
  {n:"Fernando Gatto",f:"13 Mar",h:"12:00",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Lautaro Frias",f:"13 Mar",h:"15:00",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Franco Dario Ramirez",f:"13 Mar",h:"16:00",cl:"Agustin",p:"SI",r:"Atendio - Seguimiento Wpp",w:11},
  {n:"Gustavo Alegre",f:"13 Mar",h:"16:30",cl:"Agustin",p:"SI",r:"Atendio - Seguimiento Wpp",w:11},
  {n:"Jose Alexander Rangel",f:"13 Mar",h:"16:30",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Emilio Andres Almanza",f:"13 Mar",h:"20:00",cl:"Agustin",p:"SI",r:"No tiene dinero",w:11},
  {n:"Luis Garcia",f:"14 Mar",h:"11:30",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Marcelo Ariel Baez",f:"14 Mar",h:"15:30",cl:"Agustin",p:"SI",r:"No tiene dinero",w:11},
  {n:"Fernando Gatto",f:"14 Mar",h:"",cl:"Agustin",p:"SI",r:"Pendiente - Seguimiento Wpp",w:11},
  {n:"Sergio Villanueva",f:"14 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Dito Gonzalez",f:"14 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Katerine Plasencia",f:"14 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Dario Barberan",f:"15 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Leandro Quintana",f:"15 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Marco Vocaturo",f:"15 Mar",h:"",cl:"Agustin",p:"SI",r:"Pendiente - Seguimiento Wpp",w:11},
  {n:"Aldo Soloaga",f:"15 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Luis Pablo Garcia",f:"15 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:11},
  {n:"Gaston Sequeira",f:"16 Mar",h:"12:00",cl:"Agustin",p:"NO",r:"Pendiente - Seguimiento Wpp",w:11},
  {n:"Jose Alexander Rangel",f:"16 Mar",h:"15:30",cl:"Agustin",p:"SI",r:"Pendiente - Link de pago enviado",w:11},
  {n:"Juan Perdomo",f:"16 Mar",h:"15:00",cl:"Agustin",p:"SI",r:"Compro 1 pago $1500",w:11},
  {n:"Gonzalo Corrales",f:"16 Mar",h:"10:30",cl:"Agustin",p:"SI",r:"Pendiente - Link de pago enviado",w:11},
  {n:"Fabio Della Pace",f:"16 Mar",h:"",cl:"Agustin",p:"SI",r:"Compro 1 pago $1500",w:11},

  {n:"Diego Cuello",f:"17 Mar",h:"",cl:"Agustin",p:"NO",r:"No se presento",w:12},

  {n:"Fabio Ariel Della Pace",f:"20 Mar",h:"",cl:"Agustin",p:"SI",r:"Compro 1 pago $1500",w:12},

  {n:"Darickson Caceres Mellado",f:"27 Mar",h:"15:30",cl:"",p:"",r:"Pendiente",w:13},
  {n:"Rogelio Ricardo Lobos",f:"27 Mar",h:"18:00",cl:"",p:"",r:"Pendiente",w:13},
  {n:"Belen Arce",f:"27 Mar",h:"19:15",cl:"",p:"",r:"Pendiente",w:13},
  {n:"Walter Castro",f:"27 Mar",h:"20:15",cl:"",p:"",r:"Pendiente",w:13}
];
var VN=[
  {n:"Ricardo Jose Chiementin",f:"12/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Full 1193",fa:1193,w:11},
  {n:"Diego Justet",f:"12/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Cuotas 500",fa:1500,w:11},
  {n:"Veronica Williams",f:"12/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Full 1500",fa:1500,w:11},
  {n:"Juan Pablo Perdomo",f:"16/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Full 1500",fa:1500,w:11},
  {n:"Aldo Gustavo Soloaga",f:"18/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Cuotas 750",fa:1500,w:12},
  {n:"Fabio Ariel Della Pace",f:"20/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Full 1500",fa:1500,w:12},
  {n:"Fernando Gatto",f:"20/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Cuotas 500",fa:1500,w:12},
  {n:"Eric Damian Kostoff",f:"20/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Cuotas 500",fa:1500,w:12},
  {n:"Marco Vinicio Vocaturo",f:"21/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Full 1500",fa:1500,w:12},
  {n:"Omar Dario Liva",f:"24/03",cl:"Agustin",s:"Mati",pr:"High Ticket Incubadora",pl:"Full 1500",fa:1500,w:13}
];
var WL={11:"Sem 11 (10-16 Mar)",12:"Sem 12 (17-23 Mar)",13:"Sem 13 (24-30 Mar)"};
var sel="all",cR=null,cD=null;
function bd(r){
  if(!r)return'<span class="b b-ot">-</span>';
  var l=r.toLowerCase();
  if(l.indexOf("compro")>-1||l.indexOf("abono")>-1)return'<span class="b b-buy">$ '+r+'</span>';
  if(l.indexOf("no se presento")>-1)return'<span class="b b-ns">No se presento</span>';
  if(l.indexOf("pendiente")>-1||l.indexOf("seguimiento")>-1||l.indexOf("link")>-1)return'<span class="b b-pd">'+r+'</span>';
  if(l.indexOf("no tiene")>-1)return'<span class="b b-no">Sin presupuesto</span>';
  if(l.indexOf("repetida")>-1)return'<span class="b b-ot">Repetida</span>';
  return'<span class="b b-ot">'+r+'</span>';
}
function fg(){return sel==="all"?AG:AG.filter(function(a){return a.w===+sel;});}
function fv(){return sel==="all"?VN:VN.filter(function(v){return v.w===+sel;});}
function renderTabs(){
  var h='<div class="wt '+(sel==="all"?"on":"")+'" onclick="pick('all')">Todo el periodo</div>';
  Object.keys(WL).forEach(function(k){h+='<div class="wt '+(sel===k?"on":"")+'" onclick="pick(''+k+'')">'+WL[k]+'</div>';});
  document.getElementById("tabs").innerHTML=h;
}
function pick(w){sel=w;renderTabs();render();}
function kpi(l,v,s,p,b){
  return'<div class="kpi"><div class="kl">'+l+'</div><div class="kv">'+v+'</div><div class="ks">'+s+'</div>'+(b?'<div class="pb"><div class="pf" style="width:'+p+'%"></div></div>':'')+'</div>';
}
function render(){
  var ag=fg(),vn=fv();
  var tot=ag.length;
  var pres=ag.filter(function(a){return a.p==="SI";}).length;
  var cl=ag.filter(function(a){return a.r&&(a.r.toLowerCase().indexOf("compro")>-1||a.r.toLowerCase().indexOf("abono")>-1);}).length;
  var sr=tot>0?Math.round(pres/tot*100):0;
  var cr=pres>0?Math.round(cl/pres*100):0;
  var tf=vn.reduce(function(s,v){return s+v.fa;},0);
  document.getElementById("kpis").innerHTML=
    kpi("Agendas Totales",tot,"Total del periodo","",0)+
    kpi("Se Presentaron",pres,"Show rate: "+sr+"%",sr,1)+
    kpi("Ventas Cerradas",cl,"Close rate: "+cr+"%",cr,1)+
    kpi("Facturacion Total","$"+tf.toLocaleString(),vn.length+" clientes","",0)+
    kpi("No Shows",tot-pres,"No-show: "+(100-sr)+"%","",0);
  var rc={};
  ag.forEach(function(a){
    var c;
    if(!a.r)c="Sin datos";
    else{var l=a.r.toLowerCase();
      if(l.indexOf("compro")>-1||l.indexOf("abono")>-1)c="Compro / Abono";
      else if(l.indexOf("no se presento")>-1)c="No se presento";
      else if(l.indexOf("pendiente")>-1||l.indexOf("seguimiento")>-1||l.indexOf("link")>-1)c="En seguimiento";
      else if(l.indexOf("no tiene")>-1)c="Sin presupuesto";
      else if(l.indexOf("repetida")>-1)c="Repetida";
      else c=a.r;
    }
    rc[c]=(rc[c]||0)+1;
  });
  var dc={};
  ag.forEach(function(a){dc[a.f]=(dc[a.f]||0)+1;});
  if(cR)cR.destroy();
  cR=new Chart(document.getElementById("cR").getContext("2d"),{
    type:"doughnut",
    data:{labels:Object.keys(rc),datasets:[{data:Object.values(rc),backgroundColor:["#ffd700","#ff4455","#ff8800","#8b5cf6","#06b6d4","#00c851"],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"62%",plugins:{legend:{position:"right",labels:{color:"#aaa",font:{size:11},boxWidth:12,padding:10}}}}
  });
  if(cD)cD.destroy();
  var dk=Object.keys(dc);
  cD=new Chart(document.getElementById("cD").getContext("2d"),{
    type:"bar",
    data:{labels:dk,datasets:[{data:dk.map(function(k){return dc[k];}),backgroundColor:"rgba(255,215,0,0.25)",borderColor:"#ffd700",borderWidth:2,borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#555",maxRotation:45,font:{size:10}},grid:{display:false}},y:{ticks:{color:"#555",stepSize:1},grid:{color:"rgba(255,255,255,0.04)"}}}}
  });
  var taHtml=ag.length===0?'<tr><td colspan="6" style="text-align:center;padding:30px;color:#333">Sin agendas</td></tr>':
    ag.map(function(a){return'<tr><td><strong>'+a.n+'</strong></td><td style="color:#666">'+a.f+'</td><td style="color:#555">'+(a.h||"-")+'</td><td>'+(a.cl||"-")+'</td><td>'+(a.p?'<span class="b '+(a.p==="SI"?"b-si":"b-no")+'">'+a.p+'</span>':'<span class="b b-ot">-</span>')+'</td><td>'+bd(a.r)+'</td></tr>';}).join("");
  document.getElementById("tA").innerHTML=taHtml;
  var tvHtml=vn.length===0?'<tr><td colspan="7" style="text-align:center;padding:30px;color:#333">Sin ventas</td></tr>':
    vn.map(function(v){return'<tr><td><strong>'+v.n+'</strong></td><td style="color:#666">'+v.f+'</td><td>'+v.cl+'</td><td>'+v.s+'</td><td style="color:#555;font-size:12px">'+v.pr+'</td><td>'+v.pl+'</td><td style="color:#ffd700;font-weight:800">$'+v.fa.toLocaleString()+'</td></tr>';}).join("");
  document.getElementById("tV").innerHTML=tvHtml;
}
document.getElementById("ts").textContent="Datos al 28/03/2026";
renderTabs();
render();
</script>
</body>
</html>
